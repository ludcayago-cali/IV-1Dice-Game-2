<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Corner Duel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="game-frame">
      <button class="menu-fab" aria-label="Menu">☰</button>

      <header class="top-panel">
        <div class="avatar-side">
          <div class="avatar-ring blue">
            <div class="avatar-badge">1P</div>
            <div class="avatar-image" style="background-image:url('assets/blue-removebg-preview.png')"></div>
          </div>
        </div>

        <div class="center-status">
          <div id="turnText" class="turn-text">Player 1 turn</div>
          <div id="phaseText" class="phase-text">Click Roll Dice to begin.</div>
          <div class="meta-line">
            <span id="roundText">Round 1 of 3</span>
            <span id="diceText">Dice: -</span>
          </div>
        </div>

        <div class="avatar-side">
          <div class="avatar-ring red">
            <div class="avatar-badge red-badge">2P</div>
            <div class="avatar-image" style="background-image:url('assets/red-removebg-preview.png')"></div>
          </div>
        </div>
      </header>

      <section class="board-shell">
        <div id="board" class="board"></div>
      </section>

      <section class="bottom-panel">
        <div class="score-strip">
          <div class="score-card">
            <div class="score-title">Player 1</div>
            <div id="p1Score" class="score-value">0</div>
            <div id="p1Pos" class="score-meta">(1,1)</div>
            <div id="p1Dice" class="score-meta">Die -</div>
          </div>

          <div class="score-card score-card-right">
            <div class="score-title">Bot</div>
            <div id="p2Score" class="score-value">0</div>
            <div id="p2Pos" class="score-meta">(8,8)</div>
            <div id="p2Dice" class="score-meta">Die -</div>
          </div>
        </div>

        <div class="controls">
          <button id="rollBtn" class="btn btn-roll">ROLL</button>
          <div class="result-card">
            <div class="result-label">RESULT</div>
            <div id="resultValue" class="result-value">-</div>
          </div>
        </div>

        <div class="controls controls-bottom">
          <button id="endTurnBtn" class="btn btn-secondary">End Turn</button>
          <button id="newRoundBtn" class="btn btn-secondary">Next Round</button>
          <button id="resetMatchBtn" class="btn btn-secondary danger">Reset</button>
        </div>
      </section>
    </div>
  </div>

  <div id="resultPopup" class="popup-backdrop hidden">
    <div class="popup-card">
      <div id="resultPopupText" class="popup-title">YOU WIN</div>
      <div id="resultPopupSubtext" class="popup-subtitle">Tap Next Round to continue.</div>
      <button id="resultNextBtn" class="btn btn-roll popup-btn">Next Round</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
